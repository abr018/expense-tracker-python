<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">💰 Expense Tracker</h1>

    <a href="/add" class="btn btn-primary mb-3">➕ Nova Transação</a>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Tipo</th>
                <th>Valor</th>
                <th>Categoria</th>
                <th>Data</th>
                <th>Descrição</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            {% for t in transactions %}
            <tr>
                <td>{{ t.type }}</td>
                <td>{{ t.amount }}</td>
                <td>{{ t.category }}</td>
                <td>{{ t.date }}</td>
                <td>{{ t.description }}</td>
                <td>
                  <a href="/edit/{{ loop.index0 }}" class="btn btn-warning btn-sm">✏️</a>
                  <a href="/delete/{{ loop.index0 }}" class="btn btn-danger btn-sm">🗑</a>   
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
