<!DOCTYPE html>
<html>
<head>
    <title>Editar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1>✏️ Editar Transação</h1>

    <form method="POST">

        <div class="mb-3">
            <label>Tipo</label>
            <input type="text" name="type" value="{{ t.type }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Valor</label>
            <input type="number" name="amount" value="{{ t.amount }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Categoria</label>
            <input type="text" name="category" value="{{ t.category }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Data</label>
            <input type="date" name="date" value="{{ t.date }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Descrição</label>
            <input type="text" name="description" value="{{ t.description }}" class="form-control">
        </div>

        <button class="btn btn-success">Guardar</button>
        <a href="/" class="btn btn-secondary">Cancelar</a>

    </form>

</div>

</body>
</html>
